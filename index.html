<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人博客</title>
  <meta name="description" content="一个托管在 GitHub Pages 上的个人博客。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <link rel="stylesheet" href="styles.css?v=20260611-6">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="home-button" href="#" aria-label="返回欢迎页">
        <svg class="home-button-icon" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 11.4 12 4l8 7.4"></path>
          <path d="M6.5 10.3v8.2A1.5 1.5 0 0 0 8 20h8a1.5 1.5 0 0 0 1.5-1.5v-8.2"></path>
          <path d="M10 20v-5.5h4V20"></path>
        </svg>
      </a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换深色模式" aria-pressed="false">
        <svg class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 14.3A7.8 7.8 0 0 1 9.7 4a8.5 8.5 0 1 0 10.3 10.3Z"></path>
        </svg>
        <svg class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4.2"></circle>
          <path d="M12 2.8v2.1M12 19.1v2.1M4.9 4.9l1.5 1.5M17.6 17.6l1.5 1.5M2.8 12h2.1M19.1 12h2.1M4.9 19.1l1.5-1.5M17.6 6.4l1.5-1.5"></path>
        </svg>
      </button>
      <div class="brand-block">
        <p class="brand-eyebrow">White Archive</p>
        <h1>把写作、分享与项目整理成一张个人看板</h1>
      </div>
      <nav class="tabs-wrap" aria-label="内容分类">
        <div class="tabs">
          <button class="tab" type="button" data-tab="resume">个人简历</button>
          <button class="tab" type="button" data-tab="articles">分享文章</button>
          <button class="tab" type="button" data-tab="projects">项目</button>
        </div>
      </nav>
    </header>

    <main class="workspace">
      <article class="content-panel glow-white">
        <!--
        <div id="article-empty" class="article-empty" hidden>
          <h2>当前栏目还没有内容</h2>
          <p>切换顶部 tab，或在 `posts/` 目录中新增 Markdown 文章。</p>
        </div>
        -->

        <section id="welcome-view" class="welcome-view">
          <p class="section-kicker">Welcome</p>
          <h2>你好，这里是一座慢慢生长的个人档案馆。</h2>
          <p>我把简历、文章和项目放在同一个入口里，让它们彼此保留距离，也能在需要时互相照亮。</p>
          <div class="welcome-grid">
            <a class="welcome-card" href="#tab=resume">
              <span>个人简历</span>
              <strong>经历、能力与阶段性轨迹</strong>
            </a>
            <a class="welcome-card" href="#tab=articles">
              <span>分享文章</span>
              <strong>写作、技术与思考记录</strong>
            </a>
            <a class="welcome-card" href="#tab=projects">
              <span>项目</span>
              <strong>正在打磨的想法和作品</strong>
            </a>
          </div>
          <section class="activity-section" aria-labelledby="activity-heading">
            <div class="activity-header">
              <div>
                <p class="section-kicker">Updates</p>
                <h3 id="activity-heading">文章与项目更新</h3>
              </div>
              <div id="activity-summary" class="activity-summary"></div>
            </div>
            <div id="activity-grid" class="activity-grid" aria-label="最近 6 个月文章和项目更新热力图"></div>
            <div class="activity-legend" aria-hidden="true">
              <span>少</span>
              <i class="activity-sample activity-level-1"></i>
              <i class="activity-sample activity-level-2"></i>
              <i class="activity-sample activity-level-3"></i>
              <span>多</span>
              <span class="activity-legend-type article">文章</span>
              <span class="activity-legend-type project">项目</span>
            </div>
          </section>
          <div class="skill-diamond-wrap" aria-label="技能云">
            <div id="skill-diamond" class="skill-diamond"></div>
          </div>
        </section>

        <section id="article-list-view" class="article-list-view" hidden>
          <div class="section-intro">
            <p class="section-kicker">Archive</p>
            <h2 id="list-title">个人简历归档</h2>
            <p id="list-description" class="section-copy">这里只显示标题和预览，点击卡片后进入完整文章。</p>
          </div>
          <div id="article-list" class="article-list" aria-live="polite"></div>
        </section>

        <section id="article-detail-view" class="article-detail-view" hidden>
          <button id="back-button" class="back-button" type="button">返回归档列表</button>
          <button id="edge-back-button" class="edge-back-button" type="button" aria-label="Back to list">&#8592;</button>
          <div class="content-meta">
            <div class="content-meta-top">
              <p id="article-category" class="article-category"></p>
              <p id="article-date" class="article-date"></p>
            </div>
            <h2 id="article-title"></h2>
            <p id="article-summary" class="article-summary"></p>
            <div id="article-tags" class="article-tags"></div>
          </div>
          <div id="article-loading" class="article-loading" hidden></div>
          <div id="article-content" class="markdown-body"></div>
        </section>
      </article>

      <aside class="timeline-panel">
        <div id="tag-filter-panel" class="tag-filter-panel" hidden>
          <div class="tag-filter-header">
            <p>标签</p>
            <h2>筛选文章</h2>
          </div>
          <label class="article-search-label" for="article-search">搜索文章</label>
          <input id="article-search" class="article-search" type="search" placeholder="搜索标题、摘要、正文或标签" autocomplete="off">
          <div id="tag-filter-list" class="tag-filter-list" aria-label="文章标签筛选"></div>
        </div>
        <div class="timeline-header">
          <p>时间轴</p>
          <h2 id="timeline-heading">个人简历</h2>
        </div>
        <div id="timeline" class="timeline" aria-live="polite"></div>
      </aside>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="app.js?v=20260611-10" type="module"></script>
</body>
</html>
